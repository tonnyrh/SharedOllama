services:
  ollama:
    image: ollama/ollama:latest
    container_name: shared-ollama
    volumes:
      - ollama_data:/root/.ollama
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s

  monitor-proxy:
    build:
      context: ./monitor-proxy
    container_name: shared-ollama-proxy
    depends_on:
      - ollama
    environment:
      OLLAMA_INTERNAL_URL: http://ollama:11434
      MONITOR_DB_PATH: /data/monitor.db
      MONITOR_RETENTION_DAYS: ${MONITOR_RETENTION_DAYS:-30}
    ports:
      - "${OLLAMA_BIND_ADDRESS:-0.0.0.0}:${OLLAMA_PUBLISHED_PORT:-11435}:8080"
    volumes:
      - monitor_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8080/monitor/summary', timeout=5).read()"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s

volumes:
  ollama_data:
  monitor_data:
