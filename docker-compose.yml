services:
  ollama:
    image: ollama/ollama:latest
    container_name: shared-ollama
    volumes:
      - ollama_data:/root/.ollama
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s
  monitor:
    build:
      context: ./monitor
    container_name: shared-ollama-monitor
    depends_on:
      - ollama
    environment:
      OLLAMA_BACKEND_URL: http://ollama:11434
      RATE_LIMIT_PER_MINUTE: ${RATE_LIMIT_PER_MINUTE:-120}
      MAX_QUEUE_SIZE: ${MAX_QUEUE_SIZE:-200}
      QUEUE_WORKERS: ${QUEUE_WORKERS:-2}
      ALERT_QUEUE_THRESHOLD: ${ALERT_QUEUE_THRESHOLD:-50}
      UPSTREAM_TIMEOUT_SECONDS: ${UPSTREAM_TIMEOUT_SECONDS:-300}
      MONITOR_TOKEN: ${MONITOR_TOKEN:-}
    ports:
      - "${OLLAMA_BIND_ADDRESS:-0.0.0.0}:${OLLAMA_PUBLISHED_PORT:-11435}:8080"
    restart: unless-stopped

volumes:
  ollama_data:
